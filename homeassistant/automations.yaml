# ── VM Unavailable Notification ────────────────────────────────
- id: vm_unavailable_notification
  alias: "Notify when a tracked VM goes unavailable"
  description: "Fires when any Proxmox VE integration entity becomes unavailable"
  triggers:
    - trigger: state
      entity_id:
        # TODO: replace with your actual Proxmox VE integration entities
        - binary_sensor.pve_vm_100_running
        - binary_sensor.pve_vm_101_running
        - binary_sensor.pve_vm_102_running
      to: "unavailable"
      for:
        minutes: 1
  actions:
    - action: notify.mobile_app_{{ notify_device }}
      data:
        title: "VM Unavailable"
        message: "{{ trigger.to_state.attributes.friendly_name }} is unavailable."
        data:
          tag: "vm-{{ trigger.entity_id }}"
          priority: high

# ── WAN Down Notification ─────────────────────────────────────
- id: wan_down_notification
  alias: "Notify when WAN goes down"
  description: "Triggers when UniFi WAN sensor goes offline, optionally restarts router"
  triggers:
    - trigger: state
      entity_id: binary_sensor.unifi_wan_status
      # TODO: replace with your actual UniFi WAN sensor entity
      to: "off"
      for:
        minutes: 2
  actions:
    - action: notify.mobile_app_{{ notify_device }}
      data:
        title: "WAN Down"
        message: "Internet connection has been down for 2 minutes."
        data:
          priority: high
    - wait_for_trigger:
        - trigger: state
          entity_id: binary_sensor.unifi_wan_status
          to: "on"
      timeout:
        minutes: 10
      continue_on_timeout: true
    - if:
        - condition: state
          entity_id: binary_sensor.unifi_wan_status
          state: "off"
      then:
        - action: notify.mobile_app_{{ notify_device }}
          data:
            title: "WAN Still Down"
            message: "Internet has been down for 12+ minutes. Consider restarting the router."
        # Uncomment to auto-restart router via switch entity:
        # - action: switch.turn_off
        #   target:
        #     entity_id: switch.router_power
        # - delay:
        #     seconds: 30
        # - action: switch.turn_on
        #   target:
        #     entity_id: switch.router_power

# ── Daily Summary Notification ────────────────────────────────
- id: daily_homelab_summary
  alias: "Daily homelab summary at 8am"
  description: "Sends a morning summary of homelab status"
  triggers:
    - trigger: time
      at: "08:00:00"
  actions:
    - action: notify.mobile_app_{{ notify_device }}
      data:
        title: "Homelab Daily Summary"
        message: >-
          VMs: {{ states.binary_sensor
            | selectattr('entity_id', 'match', 'binary_sensor.pve_vm_')
            | selectattr('state', 'eq', 'on')
            | list | count }} running.
          {% set degraded = states.binary_sensor
            | selectattr('entity_id', 'match', 'binary_sensor.pve_node_')
            | rejectattr('state', 'eq', 'on')
            | list %}
          {% if degraded | count > 0 %}
          Degraded nodes: {{ degraded | map(attribute='name') | join(', ') }}.
          {% else %}
          All nodes healthy.
          {% endif %}
          Immich: {{ states('sensor.immich_health') | default('unknown') }}.

# ── BirdNET-Go: Update Latest Detection ──────────────────────
- id: birdnet_update_latest_detection
  alias: "BirdNET Update Latest Detection"
  description: "Updates latest bird detection helpers whenever BirdNET-Go publishes an MQTT detection event"
  triggers:
    - trigger: mqtt
      topic: birdnet/detections
  actions:
    - action: input_text.set_value
      target:
        entity_id: input_text.birdnet_latest_bird
      data:
        value: "{{ trigger.payload_json.CommonName }}"
    - action: input_text.set_value
      target:
        entity_id: input_text.birdnet_latest_scientific_name
      data:
        value: "{{ trigger.payload_json.ScientificName }}"
    - action: input_text.set_value
      target:
        entity_id: input_text.birdnet_latest_confidence
      data:
        value: "{{ trigger.payload_json.Confidence | round(2) }}"
    - action: input_text.set_value
      target:
        entity_id: input_text.birdnet_latest_camera
      data:
        value: "{{ trigger.payload_json.sourceName | default('Unknown') }}"
    - action: input_text.set_value
      target:
        entity_id: input_text.birdnet_latest_detection_time
      data:
        value: "{{ trigger.payload_json.Time }}"
  mode: queued
  max: 5

# ── BirdNET-Go: Rare Bird Alert ───────────────────────────────
- id: birdnet_rare_bird_alert
  alias: "BirdNET Rare Bird Alert"
  description: "Sends a mobile notification when BirdNET-Go detects a rare bird (confidence > 0.9 and eBird occurrence < 0.1 or absent)"
  triggers:
    - trigger: mqtt
      topic: birdnet/detections
  conditions:
    - condition: template
      value_template: >
        {{ trigger.payload_json.Confidence | float(0) > 0.9 and
           trigger.payload_json.occurrence | default(0) | float < 0.1 }}
  actions:
    - action: notify.mobile_app_mri_3
      data:
        title: "Rare Bird Detected!"
        message: >
          {{ trigger.payload_json.CommonName }} ({{ trigger.payload_json.ScientificName }})
          — {{ (trigger.payload_json.Confidence * 100) | round(1) }}% confidence
          on {{ trigger.payload_json.sourceName | default('unknown camera') }}
  mode: parallel
  max: 10
